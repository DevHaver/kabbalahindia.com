name: "Code QA Checks"

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - synchronize
      - opened
      - ready_for_review
      - reopened
      - review_requested
    branches-ignore:
      - dependabot/**

jobs:
  qa:
    name: Lint, type-check, format-check, build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 11.1.3

      - name: Setup Node.js
        uses: actions/setup-node@v6.2.0
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (typecheck + eslint)
        run: pnpm lint

      - name: Check formatting
        run: pnpm exec prettier --check .

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  hadolint:
    name: Lint Dockerfile
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: ./Dockerfile
